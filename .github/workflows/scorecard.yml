name: OpenSSF Scorecard

on:
  branch_protection_rule:
  workflow_dispatch:
  workflow_run:
    workflows: ['CodeQL']
    types: [completed]

permissions:
  contents: read

jobs:
  scorecard:
    name: Scorecard
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'workflow_run' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        contains(fromJSON('["push","release","schedule","workflow_dispatch"]'), github.event.workflow_run.event)
      )
    permissions:
      contents: read
      id-token: write
      security-events: write
    steps:
      - name: Checkout completed CodeQL commit
        if: github.event_name == 'workflow_run'
        # actions/checkout@v4
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Checkout repository
        if: github.event_name != 'workflow_run'
        # actions/checkout@v4
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Run OpenSSF Scorecard
        # ossf/scorecard-action@v2.4.3
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a
        with:
          publish_results: true
          results_file: results.sarif
          results_format: sarif

      - name: Upload SARIF results
        # github/codeql-action/upload-sarif@v4
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e
        with:
          sarif_file: results.sarif
